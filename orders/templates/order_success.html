{% extends 'base.html' %}
{% load static %}

{% block title %}Order Successful - Tasty Restaurant{% endblock %}

{% block content %}
<div class="container mx-auto p-4">
    <!-- Modal -->
    <div id="successModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
        <div class="bg-white rounded-lg shadow-2xl p-8 max-w-md w-full transform transition-all scale-100 animate-fadeIn">
            <div class="text-center">
                <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                <h2 class="text-2xl font-bold text-gray-800 mt-4">Order Placed Successfully!</h2>
                <p class="text-gray-600 mt-2">Thank you for your order at Tasty Restaurant. We'll notify you when it's ready!</p>
                <div class="mt-6 flex justify-center space-x-4">
                    <a href="{% url 'menu' %}" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition duration-200">Back to Menu</a>
                    <button id="closeModal" class="bg-gray-300 text-gray-800 px-6 py-2 rounded-lg hover:bg-gray-400 transition duration-200">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    .animate-fadeIn {
        animation: fadeIn 0.3s ease-out;
    }
</style>

<script>
    // Close modal on button click
    document.getElementById('closeModal').addEventListener('click', function() {
        document.getElementById('successModal').classList.add('hidden');
    });
    // Close modal on clicking outside
    document.getElementById('successModal').addEventListener('click', function(event) {
        if (event.target === this) {
            this.classList.add('hidden');
        }
    });
</script>
{% endblock %}
